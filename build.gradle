plugins {
    id "fabric-loom" version "1.9-SNAPSHOT"
}

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

repositories {
    mavenCentral()
    maven { url = "https://maven.fabricmc.net/" }
    maven {
        name = "Modrinth"
        url = "https://api.modrinth.com/maven"
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
    modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"

    // Sodium + Lithium: compile against, user drops jars in mods/
    modCompileOnly "maven.modrinth:sodium:${project.sodium_version}"
    modCompileOnly "maven.modrinth:lithium:${project.lithium_version}"
}

processResources {
    inputs.property "version", project.version
    filteringCharset "UTF-8"

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21

    withSourcesJar()
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
    options.release = 21
    options.compilerArgs += ["--enable-preview"]
}

jar {
    from("LICENSE") {
        rename { "${it}_${project.archives_base_name}" }
    }
}

// Forward netherite.* system properties to the MC client JVM
loom {
    runConfigs.configureEach {
        // Enable preview features for FFM API
        vmArg "--enable-preview"
        vmArg "--enable-native-access=ALL-UNNAMED"
        // Sodium LWJGL version check bypass (dev env uses 3.3.2-snapshot, Sodium wants 3.3.1)
        vmArg "-Dsodium.checks.issue2561=false"
        // Pass through all netherite.* properties from gradle command line
        System.properties.each { k, v ->
            if (k.startsWith("netherite.")) {
                vmArg "-D${k}=${v}"
            }
        }
    }
}
